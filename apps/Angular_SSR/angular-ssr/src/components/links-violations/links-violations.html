<div class="violation-section">
  <h2>5. Ссылки</h2>

  <!-- ссылка без href -->
  <a>Текст без ссылки (не якорь)</a>

  <!-- href="#" -->
  <a href="#">Пустая ссылка (#)</a>

  <!-- одинаковый текст ссылок на разные URL -->
  <a href="https://example.com/page1">Подробнее</a>
  <a href="https://example.com/page2">Подробнее</a>

  <!-- target="_blank" без предупреждения (WCAG 2.4.7 / 3.2.5) -->
  <a href="https://example.com" target="_blank">Открыть в новом окне (без предупреждения)</a>
</div>
